name: Engine Build & Release

on:
  push:
    branches: [ main ]
    paths:
      - 'engine/**'
      - '.github/workflows/engine-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'engine/**'
      - '.github/workflows/engine-build.yml'

jobs:
  build:
    name: Build Multi-Platform Engine
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: engine/go.sum

